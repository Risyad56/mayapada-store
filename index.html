<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Mayapada Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css?v=level3">
</head>
<body>

<header class="header">
  <div class="logo-box">
    <img src="images.jpg" class="logo">
    <h1>Mayapada Store</h1>
  </div>
</header>

<div class="search-box">
  <input type="text" id="search" placeholder="Cari produk..." onkeyup="cariProduk()">
</div>

<section class="hero">
  <div class="overlay">
    <h2>Selamat Datang</h2>
    <p>Marketplace HMTG Mayapada</p>
  </div>
</section>

<div class="filter">
  <button onclick="filterProduk('all')">Semua</button>
  <button onclick="filterProduk('baju')">Baju</button>
  <button onclick="filterProduk('tas')">Tas</button>
  <button onclick="filterProduk('aksesoris')">Aksesoris</button>
</div>

<section class="produk">
  <h2>Produk Kami</h2>
  <div id="produk-list" class="produk-container"></div>
</section>

<button class="cart-btn" onclick="toggleCart()">🛒 <span id="count">0</span></button>

<div class="cart" id="cart">
  <button class="close-cart" onclick="tutupCart()">✖</button>
  <h2>Keranjang</h2>
  <ul id="list-keranjang"></ul>
  <p>Total: Rp <span id="total">0</span></p>
  <input id="nama" placeholder="Nama">
  <input id="alamat" placeholder="Alamat">
  <button onclick="checkout()">Checkout WhatsApp</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close-modal" onclick="tutupModal()">✖</span>

    <img id="modal-img">
    <div class="thumbs" id="thumbs"></div>

    <h3 id="modal-nama"></h3>
    <p id="modal-rating"></p>
    <p id="modal-harga"></p>

    <button id="modal-btn">+ Keranjang</button>
  </div>
</div>

<script src="script.js?v=level3"></script>
</body>
</html>
