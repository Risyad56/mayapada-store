<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Mayapada Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo-container">
      <img src="images.jpg" alt="Logo" class="logo">
      <h1>Mayapada Store</h1>
    </div>
  </header>

  <!-- HERO (BACKGROUND) -->
  <section class="hero">
    <div class="overlay">
      <h2>Selamat Datang di Mayapada Store</h2>
      <p>Tempat merchandise & inventaris HMTG Mayapada</p>
    </div>
  </section>

  <!-- PRODUK -->
  <section class="produk">
    <h2>Produk Kami</h2>

    <div class="produk-container">

      <!-- PRODUK 1 -->
      <div class="produk-card">
        <span class="badge">Best Seller</span>
        <img src="images.jpg" alt="Produk">
        <h3>Kaos HMTG</h3>
        <p class="harga">Rp50.000</p>
        <button onclick="tambahKeranjang('Kaos HMTG', 50000)">+ Keranjang</button>
      </div>

      <!-- PRODUK 2 -->
      <div class="produk-card">
        <img src="images.jpg" alt="Produk">
        <h3>Totebag HMTG</h3>
        <p class="harga">Rp75.000</p>
        <button onclick="tambahKeranjang('Totebag HMTG', 75000)">+ Keranjang</button>
      </div>

      <!-- PRODUK 3 -->
      <div class="produk-card">
        <img src="images.jpg" alt="Produk">
        <h3>Sticker Pack</h3>
        <p class="harga">Rp20.000</p>
        <button onclick="tambahKeranjang('Sticker Pack', 20000)">+ Keranjang</button>
      </div>

    </div>
  </section>

  <!-- KERANJANG -->
  <section class="keranjang">
    <h2>🛒 Keranjang</h2>

    <ul id="list-keranjang"></ul>

    <h3>Total: Rp<span id="total">0</span></h3>

    <input type="text" id="nama" placeholder="Nama">
    <input type="text" id="alamat" placeholder="Alamat">

    <button onclick="checkout()">Checkout ke WhatsApp</button>
  </section>

  <script src="script.js"></script>

</body>
</html>
