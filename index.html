<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Mayapada Store</title>
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo-box">
    <img src="images.jpg" class="logo">
    <h1>Mayapada Store</h1>
  </div>
</header>

<!-- SEARCH -->
<div class="search-box">
  <input type="text" id="search" placeholder="Cari produk..." onkeyup="cariProduk()">
</div>

<!-- HERO -->
<section class="hero">
  <div class="overlay">
    <h2>Selamat Datang</h2>
    <p>Marketplace HMTG Mayapada</p>
  </div>
</section>

<!-- FILTER -->
<div class="filter">
  <button onclick="filterProduk('all')">Semua</button>
  <button onclick="filterProduk('baju')">Baju</button>
  <button onclick="filterProduk('tas')">Tas</button>
  <button onclick="filterProduk('aksesoris')">Aksesoris</button>
</div>

<!-- PRODUK -->
<section class="produk">
  <h2>Produk Kami</h2>
  <div class="produk-container" id="produk-list"></div>
</section>

<!-- ADMIN PANEL -->
<section class="admin">
  <h2>Admin Panel</h2>

  <input id="namaProduk" placeholder="Nama Produk">
  <input id="hargaProduk" placeholder="Harga">
  <input id="gambarProduk" placeholder="Nama file gambar (contoh: images.jpg)">
  
  <select id="kategoriProduk">
    <option value="baju">Baju</option>
    <option value="tas">Tas</option>
    <option value="aksesoris">Aksesoris</option>
  </select>

  <button onclick="tambahProduk()">Tambah Produk</button>
</section>

<!-- CART -->
<button class="cart-btn" onclick="toggleCart()">🛒 <span id="count">0</span></button>

<div class="cart" id="cart">
  <h2>Keranjang</h2>
  <ul id="list-keranjang"></ul>
  <p>Total: Rp <span id="total">0</span></p>

  <input id="nama" placeholder="Nama">
  <input id="alamat" placeholder="Alamat">

  <button onclick="checkout()">Checkout WhatsApp</button>
</div>

<div class="notif" id="notif">Ditambahkan!</div>

<script src="script.js?v=3"></script>
</body>
</html>
