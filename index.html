<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Mayapada Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo-container">
    <img src="images.jpg" class="logo">
    <h1>Mayapada Store</h1>
  </div>

  <!-- SEARCH -->
  <input type="text" id="search" placeholder="Cari produk..." onkeyup="cariProduk()">
</header>

<!-- HERO -->
<section class="hero">
  <div class="overlay">
    <h2>Selamat Datang di Mayapada Store</h2>
    <p>Marketplace HMTG Mayapada</p>
  </div>
</section>

<!-- FILTER -->
<section class="filter">
  <button onclick="filterKategori('all')">Semua</button>
  <button onclick="filterKategori('baju')">Baju</button>
  <button onclick="filterKategori('tas')">Tas</button>
  <button onclick="filterKategori('aksesoris')">Aksesoris</button>
</section>

<!-- PRODUK -->
<section class="produk">
  <h2>Produk Kami</h2>
  <div class="produk-container" id="produk-list"></div>
</section>

<!-- NOTIF -->
<div id="notif" class="notif">✔ Ditambahkan ke keranjang</div>

<!-- CART BUTTON (ADA COUNT) -->
<button class="cart-btn" onclick="bukaCart()">
  🛒 <span id="cart-count">0</span>
</button>

<!-- POPUP CART -->
<div id="cart" class="cart">
  <h2>Keranjang</h2>
  <button onclick="tutupCart()">Tutup</button>

  <ul id="list-keranjang"></ul>

  <h3>Total: Rp<span id="total">0</span></h3>

  <input type="text" id="nama" placeholder="Nama">
  <input type="text" id="alamat" placeholder="Alamat">

  <button onclick="checkout()">Checkout ke WhatsApp</button>
</div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
