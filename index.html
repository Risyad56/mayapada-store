<!-- PRODUK -->
<section class="produk">
  <h2>Produk Kami</h2>

  <div class="produk-container">

    <!-- PRODUK 1 -->
    <div class="produk-card">
      <img src="images.jpg" alt="Produk 1">
      <h3>Kaos HMTG</h3>
      <p class="harga">Rp50.000</p>
      <button onclick="tambahKeranjang('Kaos HMTG', 50000)">+ Keranjang</button>
    </div>

    <!-- PRODUK 2 -->
    <div class="produk-card">
      <img src="images.jpg" alt="Produk 2">
      <h3>Totebag HMTG</h3>
      <p class="harga">Rp75.000</p>
      <button onclick="tambahKeranjang('Totebag HMTG', 75000)">+ Keranjang</button>
    </div>

    <!-- PRODUK 3 -->
    <div class="produk-card">
      <img src="images.jpg" alt="Produk 3">
      <h3>Sticker Pack</h3>
      <p class="harga">Rp20.000</p>
      <button onclick="tambahKeranjang('Sticker Pack', 20000)">+ Keranjang</button>
    </div>

  </div>
</section>

<!-- KERANJANG -->
<section class="keranjang">
  <h2>🛒 Keranjang</h2>

  <ul id="list-keranjang"></ul>

  <h3>Total: Rp<span id="total">0</span></h3>

  <input type="text" id="nama" placeholder="Nama">
  <input type="text" id="alamat" placeholder="Alamat">

  <button onclick="checkout()">Checkout ke WhatsApp</button>
</section>
