<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Mayapada Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo-container">
    <img src="images.jpg" class="logo">
    <h1>Mayapada Store</h1>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="overlay">
    <h2>Selamat Datang di Mayapada Store</h2>
    <p>Merchandise & inventaris HMTG</p>
  </div>
</section>

<!-- PRODUK -->
<section class="produk">
  <h2>Produk Kami</h2>

  <div class="produk-container">

    <div class="produk-card">
      <span class="badge">Best Seller</span>
      <img src="images.jpg">
      <h3>Kaos HMTG</h3>
      <p class="harga">Rp50.000</p>
      <button onclick="tambahKeranjang('Kaos HMTG',50000)">+ Keranjang</button>
    </div>

    <div class="produk-card">
      <img src="images.jpg">
      <h3>Totebag</h3>
      <p class="harga">Rp75.000</p>
      <button onclick="tambahKeranjang('Totebag',75000)">+ Keranjang</button>
    </div>

    <div class="produk-card">
      <img src="images.jpg">
      <h3>Sticker</h3>
      <p class="harga">Rp20.000</p>
      <button onclick="tambahKeranjang('Sticker',20000)">+ Keranjang</button>
    </div>

  </div>
</section>

<!-- NOTIF -->
<div id="notif" class="notif">✔</div>

<!-- BUTTON CART -->
<button class="cart-btn" onclick="bukaCart()">🛒</button>

<!-- POPUP CART -->
<div id="cart" class="cart">
  <h2>Keranjang</h2>
  <button onclick="tutupCart()">Tutup</button>

  <ul id="list-keranjang"></ul>
  <h3>Total: Rp<span id="total">0</span></h3>

  <input type="text" id="nama" placeholder="Nama">
  <input type="text" id="alamat" placeholder="Alamat">

  <button onclick="checkout()">Checkout</button>
</div>

<script src="script.js"></script>

</body>
</html>
